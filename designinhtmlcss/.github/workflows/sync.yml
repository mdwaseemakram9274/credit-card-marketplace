name: Auto Sync to Second Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push-to-another-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to target repository
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_TOKEN }}
        run: |
          if [ -z "$TARGET_TOKEN" ]; then
            echo "TARGET_TOKEN secret is missing"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add target "https://x-access-token:${TARGET_TOKEN}@github.com/mdwaseemakram9274/credit-card-marketplace.git"

          git push --force target main:main
