<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Credit card details page" />
  <title>Card Details | CreditCardMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f8fbff;color:#1f2937}
    .navbar-custom{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .brand-logo{font-weight:800;color:#0d6efd!important}
    .hero{background:linear-gradient(180deg,#0d6efd,#0a58ca);color:#fff;padding:4.5rem 0 3rem}
    .detail-card{border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 6px 18px rgba(2,6,23,.06)}
    .footer-note{border-top:1px solid #e5e7eb;color:#6b7280;font-size:.95rem;padding:1rem 0 1.5rem;margin-top:2rem}
  </style>
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-light navbar-custom fixed-top">
    <div class="container">
      <a class="navbar-brand brand-logo" href="index.html">CreditCardMarket</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Banks</a>
            <ul class="dropdown-menu" id="bankDropdownMenu">
              <li><span class="dropdown-item-text text-muted">Loading banks...</span></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="#">Categories</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Offers</a></li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0"><a class="btn btn-outline-primary" href="#">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>
<main>
  <div style="height:72px"></div>
  <section class="hero text-center"><div class="container"><h1 id="cardTitle" class="display-5 fw-bold">Card Details</h1><p id="cardDesc" class="mb-0">Card overview and application.</p></div></section>
  <section class="py-5"><div class="container"><div class="row justify-content-center"><div class="col-lg-8"><article class="card detail-card"><img id="cardImage" src="https://via.placeholder.com/900x360/0d6efd/ffffff?text=Credit+Card" class="card-img-top" alt="Credit Card"><div class="card-body"><h2 class="h4 fw-bold">Card Overview</h2><p id="overview" class="text-muted">This is a dynamic card detail placeholder page.</p><div class="d-flex gap-2 flex-wrap"><a href="#" class="btn btn-primary">Apply Now</a><a id="backToBank" href="index.html" class="btn btn-outline-primary">Back to Bank Cards</a></div></div></article></div></div></div></section>
</main>
<footer><div class="container text-center"><p class="footer-note mb-0">© 2026 CreditCardMarket. All rights reserved.</p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="data/marketplace-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search)
  const bankSlug = params.get('bank')
  const cardSlug = params.get('card')

  const titleEl = document.getElementById('cardTitle')
  const descEl = document.getElementById('cardDesc')
  const imageEl = document.getElementById('cardImage')
  const overviewEl = document.getElementById('overview')
  const backEl = document.getElementById('backToBank')
  const bankDropdownMenuEl = document.getElementById('bankDropdownMenu')

  init()

  async function init() {
    const marketplaceData = await loadMarketplaceData()
    renderBankDropdown(marketplaceData)
    const bank = (marketplaceData?.banks || []).find((entry) => entry.slug === bankSlug)
    const card = bank?.cards?.find((entry) => entry.slug === cardSlug)

    if (!bank || !card) {
      titleEl.textContent = 'Card Not Found'
      descEl.textContent = 'Please return to Home and select a valid card.'
      overviewEl.textContent = 'No data available for this card.'
      backEl.href = 'index.html'
      backEl.textContent = 'Back to Home'
      return
    }

    document.title = `${card.name} | CreditCardMarket`
    titleEl.textContent = card.name
    descEl.textContent = card.description || 'Card overview and application.'
    imageEl.src = card.imageUrl || `https://via.placeholder.com/900x360/0d6efd/ffffff?text=${encodeURIComponent(card.name)}`
    imageEl.alt = card.name
    overviewEl.textContent = card.description || 'Card details will be updated soon.'
    backEl.href = `bank.html?bank=${bank.slug}`
    backEl.textContent = `Back to ${bank.name}`
  }

  async function loadMarketplaceData() {
    try {
      const response = await fetch('/api/marketplace-data')
      if (!response.ok) {
        throw new Error('api failed')
      }
      return await response.json()
    } catch {
      return window.marketplaceData || { banks: [] }
    }
  }

  function renderBankDropdown(marketplaceData) {
    const banks = marketplaceData?.banks || []
    if (!banks.length) {
      bankDropdownMenuEl.innerHTML = '<li><span class="dropdown-item-text text-muted">No banks available</span></li>'
      return
    }

    bankDropdownMenuEl.innerHTML = banks.map((bank) => `
      <li><a class="dropdown-item" href="/bank.html?bank=${encodeURIComponent(bank.slug)}">${escapeHtml(bank.name)}</a></li>
    `).join('')
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
  }
</script>
</body>
</html>
